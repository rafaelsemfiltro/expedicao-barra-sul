<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#87ceeb" />
    <title>Expedição Barra Sul</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #fff;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        user-select: none;
      }

      #game {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: linear-gradient(180deg, #87ceeb 0%, #4aa3d4 100%);
        z-index: 100;
        transition: opacity 0.4s ease;
      }

      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loader h1 {
        font-size: 28px;
        margin: 0;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      }

      #loader p {
        font-size: 14px;
        margin: 0;
        opacity: 0.9;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.4;
        pointer-events: none;
        z-index: 10;
        backdrop-filter: blur(6px);
      }

      #hud b { color: #ffe680; }

      #zone-badge {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 8px 14px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        z-index: 10;
        backdrop-filter: blur(6px);
      }

      #hint {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 12px;
        background: rgba(0, 0, 0, 0.35);
        border-radius: 6px;
        font-size: 12px;
        opacity: 0.85;
        z-index: 10;
        pointer-events: none;
      }

      /* Mobile controls */
      #mobile-controls {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 20;
        display: none;
      }

      body.is-touch #mobile-controls { display: block; }
      body.is-touch #hint { display: none; }

      #joystick {
        position: absolute;
        left: 24px;
        bottom: 24px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.35);
        pointer-events: auto;
      }

      #joystick-nub {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 60px;
        height: 60px;
        margin-left: -30px;
        margin-top: -30px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.55);
        transition: background 0.15s ease;
      }

      #btn-run {
        position: absolute;
        right: 24px;
        bottom: 40px;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(255, 235, 130, 0.4);
        border: 2px solid rgba(255, 235, 130, 0.7);
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        user-select: none;
      }

      #btn-run.active { background: rgba(255, 235, 130, 0.75); }

      @media (max-width: 720px) {
        #hud { font-size: 11px; padding: 6px 10px; }
        #zone-badge { font-size: 12px; padding: 6px 10px; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <div id="loader">
      <h1>Expedição Barra Sul</h1>
      <p>Carregando o mundo...</p>
    </div>

    <div id="hud">
      <div><b>WASD</b> mover · <b>Shift</b> correr</div>
      <div><b>Mouse</b> girar câmera · <b>Scroll</b> zoom</div>
    </div>

    <div id="zone-badge">—</div>
    <div id="hint">Clique na tela para capturar o mouse</div>

    <div id="mobile-controls">
      <div id="joystick"><div id="joystick-nub"></div></div>
      <div id="btn-run">CORRER</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
